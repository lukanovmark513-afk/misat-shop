version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: misat-postgres
    environment:
      POSTGRES_DB: misat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: misat-redis
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: misat-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@misat.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: